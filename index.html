<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>깜짝 질문!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6e6; 
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden; /* 스크롤바가 생기는 것을 방지 */
        }

        .card {
            position: relative;
            width: 80%;
            max-width: 400px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(255, 77, 77, 0.2);
            padding: 40px 20px;
            text-align: center;
            border: 3px solid #ff4d4d;
        }

        .heart-icon {
            font-size: 60px;
            color: #ff4d4d;
            margin-top: -70px; 
            margin-bottom: 20px;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 30px;
            word-break: keep-all;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 10px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        #btn-yes {
            background-color: #ff4d4d;
            color: white;
            z-index: 9999; /* 다른 요소들보다 무조건 위에 오도록 설정 */
        }

        #btn-no {
            background-color: #ddd;
            color: #333;
        }

        #btn-yes:hover {
            background-color: #ff1a1a;
        }

        #btn-no:hover {
            background-color: #ccc;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="heart-icon">❤</div>
        <h1>김기훈을 사랑합니까?</h1>
        <div class="buttons">
            <button id="btn-yes">예</button>
            <button id="btn-no">아니오</button>
        </div>
    </div>

    <script>
        const btnYes = document.getElementById('btn-yes');
        const btnNo = document.getElementById('btn-no');

        // 버튼을 보이는 화면(뷰포트) 내 무작위 위치로 이동시키는 함수
        function moveButton() {
            // position을 fixed로 바꿔서 현재 보이는 화면을 기준으로만 움직이게 설정
            btnYes.style.position = 'fixed';
            
            // 버튼의 실제 가로, 세로 크기
            const btnWidth = btnYes.offsetWidth;
            const btnHeight = btnYes.offsetHeight;
            
            // 현재 보이는 웹브라우저 창의 가로, 세로 크기
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // 화면 끝에 딱 붙지 않도록 안전 여백 설정 (20px)
            const safeMargin = 20;
            
            // 버튼이 이동할 수 있는 최대 X, Y 좌표 계산
            const maxX = windowWidth - btnWidth - safeMargin;
            const maxY = windowHeight - btnHeight - safeMargin;
            
            // 최소 safeMargin 부터 최대 maxX(maxY) 사이의 랜덤 좌표 생성
            const randomX = Math.max(safeMargin, Math.floor(Math.random() * maxX));
            const randomY = Math.max(safeMargin, Math.floor(Math.random() * maxY));
            
            btnYes.style.left = randomX + 'px';
            btnYes.style.top = randomY + 'px';
        }

        // 데스크탑: 마우스가 올라갈 때
        btnYes.addEventListener('mouseover', moveButton);
        
        // 모바일: 터치하려고 할 때
        btnYes.addEventListener('touchstart', function(e) {
            e.preventDefault(); 
            moveButton();
        }, { passive: false });

        // '아니오' 클릭 시 반응
        btnNo.addEventListener('click', function() {
            alert('어떻게 그럴 수가...');
        });
        
        // 기적적으로 '예'를 클릭 시 반응
        btnYes.addEventListener('click', function() {
            alert('드디어 잡았네! 나도 사랑해 ❤');
        });
    </script>
</body>
</html>
