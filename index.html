<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 아이폰 등에서 웹앱 느낌을 주기 위한 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>시스템 확인</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f4f4f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none; /* 텍스트 선택 방지 */
        }

        /* 첫 시작 화면 (미끼) */
        #intro-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }

        #intro-screen h2 {
            color: #333;
            margin-bottom: 30px;
        }

        #start-btn {
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* 가짜 블루스크린 화면 */
        #bsod-screen {
            display: none; /* 처음엔 숨김 */
            background-color: #0078D7; /* 윈도우 블루스크린 고유 색상 */
            color: white;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
            padding: 8% 10%;
            flex-direction: column;
            justify-content: center;
        }

        .sad-face {
            font-size: 8rem;
            margin-bottom: 20px;
            line-height: 1;
        }

        .main-text {
            font-size: 1.8rem;
            margin-bottom: 30px;
            line-height: 1.4;
            word-break: keep-all;
        }

        .percent-text {
            font-size: 1.8rem;
            margin-bottom: 40px;
        }

        .bottom-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        .qr-code {
            width: 120px;
            height: 120px;
            background: white;
            padding: 5px;
            border-radius: 5px;
        }

        .qr-code img {
            width: 100%;
            height: 100%;
        }

        .error-details {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .error-code {
            font-weight: bold;
            font-size: 1.4rem;
            margin-top: 10px;
            color: #ffeb3b; /* 눈에 띄는 노란색 포인트 */
        }

        /* 모바일 화면 대응 */
        @media (max-width: 600px) {
            .sad-face { font-size: 6rem; }
            .main-text { font-size: 1.4rem; }
            .percent-text { font-size: 1.4rem; }
            .bottom-info { flex-direction: column; align-items: flex-start; }
            .error-details { font-size: 1rem; }
            .error-code { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- 미끼 화면 -->
    <div id="intro-screen">
        <h2>💌 기훈이의 비밀 메시지가 도착했습니다.</h2>
        <button id="start-btn">메시지 열어보기</button>
    </div>

    <!-- 블루스크린 화면 -->
    <div id="bsod-screen">
        <div class="sad-face">:(</div>
        <div class="main-text">
            디바이스에 치명적인 문제가 발생하여 다시 시작해야 합니다.<br>
            일부 오류 정보를 수집하고 있습니다. (자동으로 다시 시작됩니다.)
        </div>
        <div class="percent-text"><span id="percentage">0</span>% 완료</div>
        
        <div class="bottom-info">
            <!-- QR 코드 이미지 -->
            <div class="qr-code">
                <!-- QR 코드 링크 (현재는 "김기훈을 사랑합니까?"라는 텍스트를 담은 QR입니다) -->
                <!-- 편지나 인스타 링크를 원하면 아래 data= 뒤에 웹 주소를 넣으세요! -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=기훈이를 향한 사랑이 너무 과열되어 발생한 시스템 오류입니다! ❤ 나도 사랑해!" alt="QR">
            </div>
            <div class="error-details">
                이 문제와 가능한 해결 방법에 대해 자세히 알아보려면 다음 코드를 확인하세요.<br>
                <div class="error-code">Error Code: TOO_MUCH_LOVE_FOR_KIHUN</div>
            </div>
        </div>
    </div>

    <script>
        const introScreen = document.getElementById('intro-screen');
        const bsodScreen = document.getElementById('bsod-screen');
        const percentageSpan = document.getElementById('percentage');
        const startBtn = document.getElementById('start-btn');

        // 전체 화면 실행 함수
        function enterFullScreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.mozRequestFullScreen) { // Firefox
                elem.mozRequestFullScreen();
            } else if (elem.webkitRequestFullscreen) { // Chrome, Safari
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { // IE/Edge
                elem.msRequestFullscreen();
            }
        }

        startBtn.addEventListener('click', function() {
            // 1. 전체 화면으로 전환 (브라우저 정책상 클릭할 때만 실행 가능)
            enterFullScreen();

            // 2. 미끼 화면 숨기고 블루스크린 띄우기
            introScreen.style.display = 'none';
            document.body.style.backgroundColor = '#0078D7';
            bsodScreen.style.display = 'flex';

            // 3. 리얼함을 살리기 위해 퍼센트 올리기 타이머
            let percent = 0;
            const interval = setInterval(() => {
                // 퍼센트가 랜덤하게 오르게 설정
                percent += Math.floor(Math.random() * 5) + 1;
                if (percent >= 100) {
                    percent = 100;
                    clearInterval(interval);
                }
                percentageSpan.innerText = percent;
            }, 800); // 0.8초마다 퍼센트 상승
        });
    </script>
</body>
</html>
